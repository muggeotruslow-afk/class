<style>
  /* ── 亮色主题 ── */
  :root {
    --bg: #F2F0EB;
    --surface: #FFFFFF;
    --surface2: #F8F7F4;
    --border: #E5E2DC;
    --text-primary: #1A1915;
    --text-secondary: #6B6860;
    --text-muted: #A8A49E;
    --accent: #2D6A4F;
    --accent-light: #D8EDE4;
    --today: #C1392B;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.1);
    --tabbar-bg: rgba(255,255,255,0.92);
    --radius: 14px;
    --radius-sm: 8px;
  }

  /* ── 深色主题 ── */
  [data-theme="dark"] {
    --bg: #111110;
    --surface: #1C1C1A;
    --surface2: #242422;
    --border: #2E2E2B;
    --text-primary: #F0EDE8;
    --text-secondary: #A09D97;
    --text-muted: #5C5A56;
    --accent: #4ADE80;
    --accent-light: #14291E;
    --today: #E05A4A;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.3);
    --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
    --tabbar-bg: rgba(28,28,26,0.94);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.2s, color 0.2s;
    /* 异形屏适配 */
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    padding-top: env(safe-area-inset-top);
    position: sticky; top: 0; z-index: 100;
    transition: background 0.2s, border-color 0.2s;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0 10px;
  }
  .header-title { font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.02em; }
  .header-subtitle { font-size: 17px; font-weight: 700; color: var(--text-primary); margin-top: 1px; }

  /* 右上角按钮组 */
  .header-actions { display: flex; align-items: center; gap: 6px; }

  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s; color: var(--text-secondary);
    flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn svg { width: 16px; height: 16px; }

  .week-ctrl { display: flex; align-items: center; gap: 6px; }
  .ctrl-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.12s; color: var(--text-secondary);
  }
  .ctrl-btn:active { transform: scale(0.92); background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

  .week-selector {
    display: flex; align-items: center; gap: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 100px; padding: 6px 10px 6px 16px;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .week-selector:active { border-color: var(--accent); }
  .week-selector-label { font-size: 13px; font-weight: 600; color: var(--text-primary); font-family: 'DM Mono', monospace; }

  /* ── WEEK NAV (星期栏) ── */
  .week-nav {
    display: flex; align-items: center; gap: 2px;
    padding: 8px 0 12px; overflow-x: auto; scrollbar-width: none;
  }
  .week-nav::-webkit-scrollbar { display: none; }

  .week-nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 8px 12px; border-radius: 12px; cursor: pointer;
    transition: all 0.15s; flex-shrink: 0; border: 1.5px solid transparent;
    min-width: 48px; user-select: none;
  }
  .week-nav-btn .day-name { font-size: 11px; font-weight: 500; color: var(--text-muted); }
  .week-nav-btn .day-date {
    font-size: 17px; font-weight: 700; color: var(--text-secondary);
    font-family: 'DM Mono', monospace; line-height: 1.1;
  }
  .week-nav-btn .day-count {
    font-size: 10px; font-weight: 500; color: var(--text-muted);
    line-height: 1;
  }
  .week-nav-btn.active { background: var(--text-primary); border-color: var(--text-primary); }
  .week-nav-btn.active .day-name,
  .week-nav-btn.active .day-date,
  .week-nav-btn.active .day-count { color: #fff; }
  .week-nav-btn.active .day-count { color: rgba(255,255,255,0.6); }

  .week-nav-btn.is-today:not(.active) { border-color: var(--today); }
  .week-nav-btn.is-today:not(.active) .day-name { color: var(--today); font-weight: 700; }
  .week-nav-btn.is-today:not(.active) .day-date { color: var(--today); }
  .week-nav-btn:active:not(.active) { background: var(--surface2); }

  /* ── MAIN ── */
  .main {
    max-width: 680px; margin: 0 auto;
    padding: 16px 16px 100px; /* 底部留出tab bar空间 */
  }

  .day-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .day-header-title { font-size: 20px; font-weight: 700; }
  .day-header-sub { font-size: 13px; color: var(--text-muted); }
  .day-today-badge {
    font-size: 11px; font-weight: 600; background: var(--today);
    color: #fff; padding: 2px 8px; border-radius: 100px;
  }

  .period-group { margin-bottom: 20px; }
  .period-group-label {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .period-group-label span {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-muted);
  }

  /* ── COURSE CARD ── */
  .course-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 12px 13px 12px 17px; margin-bottom: 8px;
    box-shadow: var(--card-shadow); border: 1px solid var(--border);
    transition: box-shadow 0.18s, transform 0.18s, background 0.2s, border-color 0.2s;
    position: relative; overflow: hidden;
  }
  .course-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  }
  .c1::before { background: #3B82F6; }
  .c2::before { background: #8B5CF6; }
  .c3::before { background: #10B981; }
  .c4::before { background: #F59E0B; }
  .c5::before { background: #EF4444; }
  .c6::before { background: #EC4899; }
  .course-card:active { transform: scale(0.99); }

  .course-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 8px; margin-bottom: 7px;
  }
  .course-name { font-size: 14px; font-weight: 600; line-height: 1.35; }
  .period-badge {
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    color: var(--text-muted); background: var(--surface2);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 2px 6px; flex-shrink: 0; white-space: nowrap;
    transition: background 0.2s, border-color 0.2s;
  }
  .course-meta { display: flex; flex-wrap: wrap; gap: 5px; }
  .meta-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-secondary);
    background: var(--surface2); border-radius: 6px;
    padding: 2px 7px; border: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
  }
  .meta-tag svg { width: 10px; height: 10px; opacity: 0.5; flex-shrink: 0; }
  .week-range-tag {
    display: inline-flex; align-items: center;
    font-size: 11px; color: var(--accent); font-weight: 600;
    background: var(--accent-light); border-radius: 6px;
    padding: 2px 7px; font-family: 'DM Mono', monospace;
    transition: background 0.2s, color 0.2s;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px; text-align: center;
  }
  .empty-icon {
    width: 56px; height: 56px; background: var(--surface2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px; border: 1px solid var(--border);
  }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-desc { font-size: 13px; color: var(--text-muted); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 200; display: none; align-items: flex-end;
    justify-content: center; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--surface); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 680px;
    padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
    animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
    transition: background 0.2s;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .week-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .week-option {
    padding: 12px 6px; text-align: center; border-radius: var(--radius-sm);
    cursor: pointer; border: 1.5px solid var(--border);
    font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace;
    color: var(--text-secondary); transition: all 0.12s;
    user-select: none;
  }
  .week-option:active { border-color: var(--accent); color: var(--accent); }
  .week-option.selected { background: var(--text-primary); border-color: var(--text-primary); color: #fff; }

  /* ── BOTTOM TAB BAR ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--tabbar-bg);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    display: flex; align-items: center; justify-content: space-around;
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    z-index: 99;
    transition: background 0.2s, border-color 0.2s;
  }
  .tab-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; padding: 6px 20px; border-radius: 12px;
    transition: all 0.15s; color: var(--text-muted);
    user-select: none; flex: 1; max-width: 100px;
  }
  .tab-btn:active { background: var(--surface2); transform: scale(0.95); }
  .tab-btn svg { width: 22px; height: 22px; transition: all 0.15s; }
  .tab-btn span { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; }
  .tab-btn.active { color: var(--text-primary); }
  .tab-btn.active svg { stroke-width: 2.2; }

  /* 今日按钮特殊样式 */
  .tab-btn.today-btn { color: var(--today); }
  .tab-btn.today-btn:active { background: rgba(193,57,43,0.08); }

  /* ── SWIPE HINT ── */
  .swipe-area {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0; pointer-events: none;
  }

  /* ── 响应式 ── */
  @media (max-width: 480px) {
    .main { padding: 12px 12px 100px; }
    .header { padding: 0 14px; padding-top: env(safe-area-inset-top); }
    .week-nav-btn { min-width: 44px; padding: 8px 10px; }
    .course-name { font-size: 14px; }
  }

  @media (min-width: 680px) {
    .tab-bar { max-width: 680px; left: 50%; transform: translateX(-50%); border-radius: 20px 20px 0 0; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  }
</style>
</head>

// ─────────────────────────────────────────────
// 常量 & 状态
// ─────────────────────────────────────────────
const DAYS = ['周一','周二','周三','周四','周五','周六','周日'];

const TODAY_JS  = new Date().getDay();
const TODAY_IDX = TODAY_JS === 0 ? 6 : TODAY_JS - 1;

// 学期第1周周一 = 2026-03-09
const SEM_START = new Date('2026-03-09');

let currentWeek   = 1;
let currentDayIdx = TODAY_IDX;

// 推算当前周
(function initWeek() {
  const diff = Math.floor((new Date() - SEM_START) / 86400000);
  if (diff >= 0) currentWeek = Math.min(16, Math.max(1, Math.floor(diff / 7) + 1));
})();

// 根据周次和星期索引（0=周一）计算几号
function getDayDate(weekNum, dayIdx) {
  const d = new Date(SEM_START);
  d.setDate(d.getDate() + (weekNum - 1) * 7 + dayIdx);
  return d.getDate();
}

// ─────────────────────────────────────────────
// 深色模式
// ─────────────────────────────────────────────
let isDark = false;

function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') { isDark = true; applyTheme(); }
  else if (saved === 'light') { isDark = false; applyTheme(); }
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    isDark = true; applyTheme();
  }
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  // 同步更新 theme-color（安卓状态栏颜色）
  document.querySelectorAll('meta[name="theme-color"]').forEach(m => m.remove());
  const tc = document.createElement('meta');
  tc.name = 'theme-color';
  tc.content = isDark ? '#1C1C1A' : '#ffffff';
  document.head.appendChild(tc);
  const icon = document.getElementById('themeIcon');
  if (isDark) {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
}

function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  applyTheme();
}

// ─────────────────────────────────────────────
// 工具
// ─────────────────────────────────────────────
function inWeek(weeks, week) {
  return Array.isArray(weeks) && weeks.includes(week);
}

function weeksLabel(weeks) {
  if (!weeks || !weeks.length) return '';
  const s = [...weeks].sort((a,b) => a-b);
  const ranges = [];
  let lo = s[0], hi = s[0];
  for (let i = 1; i < s.length; i++) {
    if (s[i] === hi + 1) { hi = s[i]; }
    else { ranges.push(lo === hi ? `${lo}` : `${lo}-${hi}`); lo = hi = s[i]; }
  }
  ranges.push(lo === hi ? `${lo}` : `${lo}-${hi}`);
  return ranges.join(', ') + '周';
}

function zone(p) {
  return p <= 4 ? '上午' : p <= 8 ? '下午' : '晚上';
}

function getDayCourses(dayIdx, week) {
  return courses
    .filter(c => c.day === dayIdx && inWeek(c.weeks, week))
    .sort((a, b) => a.periods[0] - b.periods[0]);
}

// ─────────────────────────────────────────────
// 渲染
// ─────────────────────────────────────────────
function renderWeekNav() {
  document.getElementById('weekNav').innerHTML = DAYS.map((d, i) => {
    const count = getDayCourses(i, currentWeek).length;
    const dateNum = getDayDate(currentWeek, i);
    return `<div class="week-nav-btn ${i===currentDayIdx?'active':''} ${i===TODAY_IDX?'is-today':''}"
                 onclick="selectDay(${i})">
      <span class="day-name">${d}</span>
      <span class="day-date">${dateNum}</span>
      <span class="day-count">${count ? count+'节' : '无课'}</span>
    </div>`;
  }).join('');
}

function renderMain() {
  const isToday = currentDayIdx === TODAY_IDX;
  const list = getDayCourses(currentDayIdx, currentWeek);
  let html = `<div class="day-header">
    <span class="day-header-title">${DAYS[currentDayIdx]}</span>
    ${isToday ? '<span class="day-today-badge">今天</span>' : ''}
    <span class="day-header-sub">第 ${currentWeek} 周 · ${getDayDate(currentWeek, currentDayIdx)}日</span>
  </div>`;

  if (!list.length) {
    html += `<div class="empty-state">
      <div class="empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-muted)">
          <rect x="3" y="4" width="18" height="18" rx="3"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div class="empty-title">本日无课</div>
      <div class="empty-desc">第${currentWeek}周 · ${DAYS[currentDayIdx]}没有排课</div>
    </div>`;
    document.getElementById('mainContent').innerHTML = html;
    return;
  }

  const groups = { '上午':[], '下午':[], '晚上':[] };
  list.forEach(c => groups[zone(c.periods[0])].push(c));

  ['上午','下午','晚上'].forEach(z => {
    if (!groups[z].length) return;
    html += `<div class="period-group">
      <div class="period-group-label"><span>${z}</span></div>`;
    groups[z].forEach(c => {
      const cl = COLOR_MAP[c.name] || 'c3';
      html += `<div class="course-card ${cl}">
        <div class="course-top">
          <div class="course-name">${c.name}</div>
          <div class="period-badge">第${c.periods[0]}–${c.periods[1]}节</div>
        </div>
        <div class="course-meta">
          <span class="meta-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>${c.teacher}
          </span>
          <span class="meta-tag">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M9 9h6M9 12h6M9 15h4"/>
            </svg>${c.room}
          </span>
          <span class="week-range-tag">${weeksLabel(c.weeks)}</span>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('mainContent').innerHTML = html;
}

// ─────────────────────────────────────────────
// 周次选择器
// ─────────────────────────────────────────────
function renderWeekPicker() {
  document.getElementById('weekGrid').innerHTML =
    Array.from({length:16}, (_,i) => i+1).map(wk =>
      `<div class="week-option ${wk===currentWeek?'selected':''}" onclick="pickWeek(${wk})">第${wk}周</div>`
    ).join('');
}
function openModal()  { renderWeekPicker(); document.getElementById('modalOverlay').classList.add('open'); }
function closeModal(e){ if (e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); }
function pickWeek(wk) {
  currentWeek = wk;
  document.getElementById('weekLabel').textContent = `第${wk}周`;
  document.getElementById('modalOverlay').classList.remove('open');
  renderWeekNav(); renderMain();
}
function changeWeek(d) {
  currentWeek = Math.max(1, Math.min(16, currentWeek + d));
  document.getElementById('weekLabel').textContent = `第${currentWeek}周`;
  renderWeekNav(); renderMain();
}
function selectDay(idx) { currentDayIdx = idx; renderWeekNav(); renderMain(); }
function goToday() {
  // 推算今天是第几周
  const diff = Math.floor((new Date() - SEM_START) / 86400000);
  if (diff >= 0) currentWeek = Math.min(16, Math.max(1, Math.floor(diff / 7) + 1));
  currentDayIdx = TODAY_IDX;
  document.getElementById('weekLabel').textContent = `第${currentWeek}周`;
  renderWeekNav(); renderMain();
  // 滚回顶部
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────
// 左右滑动切换周次（swipe）
// ─────────────────────────────────────────────
(function initSwipe() {
  let startX = 0, startY = 0, locked = false;

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    locked = false;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if (locked) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // 横向位移 > 60px，且横向幅度明显大于纵向（防止误触上下滚动）
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      locked = true;
      if (dx < 0) changeWeek(1);   // 左滑 → 下一周
      else         changeWeek(-1);  // 右滑 → 上一周
    }
  }, { passive: true });
})();

// ─────────────────────────────────────────────
// 初始化
// ─────────────────────────────────────────────
initTheme();
document.getElementById('weekLabel').textContent = `第${currentWeek}周`;
renderWeekNav();
renderMain();
</script>
